<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thunopro</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Ubuntu+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Quill for Rich Text Editing -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

    <!-- KaTeX for LaTeX rendering (faster + copyable source text) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark-mode');
        }
        if (localStorage.getItem('bg-mode') === 'image') {
            document.documentElement.classList.add('with-bg');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <header class="top-header">
        <div class="container header-flex">
            <div class="logo">
                <a href="#/">
                    <span class="logo-thuno">THUNO</span><span class="logo-pro">PRO</span><span
                        class="logo-tagline">just do it.</span>
                </a>
            </div>
            <div class="user-panel">
                <div class="auth-links">
                    <button id="bg-toggle" class="btn-icon" aria-label="Toggle Background"><i class="fas fa-image"></i></button>
                    <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
                    <a href="#" id="auth-btn" class="btn-login">Login</a>
                </div>
            </div>
        </div>
    </header>

    <nav class="main-nav">
        <div class="container nav-flex">
            <ul class="menu-list">
                <li><a href="#/" id="nav-today"><i class="fas fa-calendar-day"></i> TODAY</a></li>
                <li><a href="#/problems" id="nav-problems"><i class="fas fa-list"></i> ALL PROBLEMS</a></li>
                <li><a href="#/categories" id="nav-categories"><i class="fas fa-layer-group"></i> CATEGORIES</a></li>
                <li><a href="#/blog" id="nav-blog"><i class="fas fa-pen-nib"></i> BLOG</a></li>
            </ul>
        </div>
    </nav>

    <!-- SPA Root Container -->
    <div id="app-root">
        <!-- Content will be dynamically injected here by script.js -->
    </div>

    <footer>
        <div class="container footer-content">
            <div class="logo-footer">THUNO<span>PRO</span></div>
            <div class="social-links">
                <a href="https://github.com/thunopro" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://www.youtube.com/@thunoprosolveIMO" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h2 id="auth-title">Đăng nhập</h2>
            <p class="modal-error" id="auth-msg"></p>
            <form id="auth-form" autocomplete="on">
                <input type="email" id="auth-email" name="email" class="modal-input" placeholder="Email" autocomplete="email">
                <input type="password" id="auth-pass" name="password" class="modal-input" placeholder="Mật khẩu" autocomplete="current-password">
                
                <div id="auth-options" class="auth-options" style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 14px;">
                    <label style="color: var(--text-muted); cursor: pointer;"><input type="checkbox" id="auth-remember" style="margin-right: 4px; accent-color: var(--text);"> Ghi nhớ</label>
                    <a href="#" id="auth-forgot">Quên mật khẩu?</a>
                </div>

                <button type="submit" id="btn-submit-auth" class="btn-primary" style="width:100%; padding: 10px;">Đăng nhập</button>
            </form>

            <div class="auth-divider">
                <span>Hoặc</span>
            </div>
            
            <button id="btn-google-login" class="btn-outline" style="width: 100%; padding: 10px; margin-bottom: 14px;">
                <i class="fab fa-google" style="margin-right: 8px;"></i> Đăng nhập bằng Google
            </button>

            <p class="modal-switch">
                <a href="#" id="auth-toggle-mode">Đăng ký tài khoản</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
