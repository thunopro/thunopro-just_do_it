<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - thunopro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg);
        }
        .reset-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .reset-box h2 {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 700;
        }
        .modal-input {
            width: 100%; padding: 10px 12px; margin-bottom: 16px;
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg); color: var(--text);
            font-family: inherit; font-size: 14px; outline: none;
        }
        .modal-input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="reset-box">
        <h2>Đặt lại mật khẩu mới</h2>
        <p id="reset-msg" style="color: var(--text-muted); font-size: 14px; margin-bottom: 16px;">Vui lòng nhập mật khẩu mới của bạn.</p>
        
        <form id="reset-form">
            <input type="password" id="new-password" class="modal-input" placeholder="Mật khẩu mới (ít nhất 6 ký tự)" required minlength="6">
            <button type="submit" id="btn-submit" class="btn-primary" style="width:100%; padding: 12px;">Đổi mật khẩu</button>
        </form>
        <div style="margin-top: 20px; text-align: center;">
            <a href="/" style="font-size: 14px; font-weight: 600;">← Trở về trang chủ</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jtjmeqlrcwfbewmxqsxy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0am1lcWxyY3dmYmV3bXhxc3h5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjQzMDU4NSwiZXhwIjoyMDkyMDA2NTg1fQ.TTEQRXKorjHwf1LaJt4CF8qr4Et_j4mQ2ljgdhAhqd0";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Kiểm tra xem user có truy cập đúng qua link từ Email không (phải có session được tạo từ URL token)
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const hash = window.location.hash;
            const msg = document.getElementById('reset-msg');
            const btn = document.getElementById('btn-submit');
            const newPassword = document.getElementById('new-password');

            // Nếu không có session và không có URL hash chứa token phục hồi
            if (!session && !hash.includes('type=recovery')) {
                msg.style.color = '#ef4444';
                msg.textContent = '❌ Lỗi: Bạn phải mở trang này từ đường link "Đặt lại mật khẩu" trong email. Vui lòng yêu cầu lại.';
                btn.disabled = true;
                newPassword.disabled = true;
            }
        });

        // Xử lý sự kiện onAuthStateChange để bắt sự kiện PASSWORD_RECOVERY
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                const msg = document.getElementById('reset-msg');
                msg.style.color = '#22c55e';
                msg.textContent = '✅ Đã xác thực link thành công. Vui lòng nhập mật khẩu mới.';
                document.getElementById('btn-submit').disabled = false;
                document.getElementById('new-password').disabled = false;
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const msg = document.getElementById('reset-msg');
            const btn = document.getElementById('btn-submit');
            
            if (newPassword.length < 6) {
                msg.style.color = '#ef4444';
                msg.textContent = 'Mật khẩu phải có ít nhất 6 ký tự.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';
            msg.style.color = 'var(--text-muted)';
            msg.textContent = 'Vui lòng chờ...';

            // Cập nhật password cho user đang có session hiện tại
            const { data, error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                msg.style.color = '#ef4444';
                msg.textContent = 'Lỗi: ' + error.message;
                btn.disabled = false;
                btn.textContent = 'Đổi mật khẩu';
            } else {
                msg.style.color = '#22c55e';
                msg.textContent = 'Thành công! Đang chuyển về trang chủ...';
                setTimeout(() => {
                    // Xoá hash khỏi URL và chuyển hướng
                    window.location.href = '/';
                }, 2000);
            }
        });
    </script>
</body>
</html>
